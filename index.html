<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#fbf6ef">
  <title>PSS:NICU — Clinician Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* =========================================================
       PSS:NICU — Warm Empathic Design System
       Palette: peach / terracotta / sage / clay
       ========================================================= */
    :root {
      /* Warm neutrals */
      --paper:        #fbf6ef;     /* page bg, slightly warmer than off-white */
      --paper-2:      #f5ede1;     /* secondary surface */
      --paper-3:      #efe5d4;     /* sunken surface */
      --card:         #ffffff;
      --line:         #e8dccb;     /* hairline */
      --line-soft:    #f0e7d8;

      /* Ink */
      --ink:          #2a221a;     /* warm near-black */
      --ink-2:        #5b4d3f;
      --ink-3:        #8a7868;
      --ink-4:        #b6a791;

      /* Accents — warm clinical */
      --terracotta:   #c45a3e;     /* primary action / brand */
      --terracotta-2: #e07c66;
      --clay:         #d68a5e;     /* secondary */
      --peach:        #f4d4be;
      --peach-soft:   #fbe8d8;
      --sage:         #6e8a6a;     /* calm / OK */
      --sage-soft:    #d9e1ce;
      --rose:         #b3503e;     /* high risk */
      --plum:         #6f3b58;     /* extreme */
      --honey:        #c89a3e;     /* moderate */

      /* Subscale color tokens */
      --ss-color:     #6b8aaa;     /* sights & sounds — cool blue-grey */
      --ss-bg:        #e7eef4;
      --ia-color:     #c89a3e;     /* infant appearance — honey */
      --ia-bg:        #f7ecd1;
      --pr-color:     #a05a8a;     /* parental role — muted plum */
      --pr-bg:        #f1e2eb;
      --sc-color:     #6e8a6a;     /* staff comm — sage */
      --sc-bg:        #e1ead5;

      /* Severity scale */
      --sev-none:     #6e8a6a;
      --sev-mild:     #c89a3e;
      --sev-mod:      #d68a5e;
      --sev-high:     #b3503e;
      --sev-extreme:  #6f3b58;

      /* Spacing scale (compact vs comfortable) */
      --d:            1;            /* density multiplier — 1 = comfortable, 0.78 = compact */
      --s1:  calc(4px  * var(--d));
      --s2:  calc(8px  * var(--d));
      --s3:  calc(12px * var(--d));
      --s4:  calc(16px * var(--d));
      --s5:  calc(20px * var(--d));
      --s6:  calc(24px * var(--d));
      --s7:  calc(32px * var(--d));
      --s8:  calc(40px * var(--d));
      --s9:  calc(56px * var(--d));

      /* Type */
      --serif:  "Sarabun", sans-serif;
      --sans:   "Sarabun", sans-serif;
      --mono:   "IBM Plex Mono", ui-monospace, monospace;
      --thai:   "Sarabun", "Manrope", sans-serif;

      /* Risk thresholds (raw out of 104) — tweakable */
      --th-mild: 27;
      --th-mod:  53;
      --th-high: 79;

      /* Radii */
      --r1: 6px;
      --r2: 10px;
      --r3: 14px;
      --r4: 20px;
      --r5: 28px;

      /* Shadows */
      --sh1: 0 1px 2px rgba(60,40,20,.04), 0 1px 1px rgba(60,40,20,.03);
      --sh2: 0 4px 14px rgba(60,40,20,.06), 0 1px 2px rgba(60,40,20,.04);
      --sh3: 0 16px 40px rgba(60,40,20,.10), 0 2px 6px rgba(60,40,20,.05);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body { min-height: 100vh; overscroll-behavior-y: none; }

    /* App scale wrapper — mobile-first (iPhone/iPad/Android primary) */
    #root { min-height: 100vh; }

    /* Type helpers */
    .serif { font-family: var(--serif); font-weight: 500; letter-spacing: -0.01em; }
    .mono  { font-family: var(--mono); }
    .thai  { font-family: var(--thai); }

    h1, h2, h3, h4 { font-family: var(--serif); font-weight: 500; letter-spacing: -0.015em; margin: 0; color: var(--ink); }
    h1 { font-size: 38px; line-height: 1.2; padding-bottom: 0.08em; }
    h2 { font-size: 28px; line-height: 1.18; padding-bottom: 0.08em; }
    h3 { font-size: 20px; line-height: 1.25; }
    h4 { font-size: 16px; line-height: 1.25; font-family: var(--sans); font-weight: 700; letter-spacing: 0; }

    p { margin: 0; color: var(--ink-2); line-height: 1.5; }

    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; touch-action: manipulation; -webkit-tap-highlight-color: rgba(0,0,0,0); }
    input, select, textarea { font-family: inherit; color: inherit; }

    /* Reusable card */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--r3);
      box-shadow: var(--sh1);
    }

    /* Pill */
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.02em;
      border: 1px solid var(--line);
      background: var(--paper-2);
      color: var(--ink-2);
    }

    /* Risk dot */
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 16px;
      border-radius: var(--r2);
      font-weight: 600; font-size: 13px;
      border: 1px solid transparent;
      transition: transform .08s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: var(--terracotta); color: #fff; }
    .btn-primary:hover { background: #b04f37; }
    .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
    .btn-ghost:hover { background: var(--paper-2); }
    .btn-subtle { background: var(--paper-2); color: var(--ink); }
    .btn-subtle:hover { background: var(--paper-3); }

    /* Subtle scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; border: 2px solid var(--paper); }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: none; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse-soft { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

    .fade-in { animation: fadeIn .25s ease both; }
    .slide-in { animation: slideIn .3s ease both; }
    .scale-in { animation: scaleIn .25s ease both; }

    /* Focus ring */
    :focus-visible {
      outline: 2px solid var(--terracotta);
      outline-offset: 2px;
      border-radius: 6px;
    }

    /* Texture utility — subtle paper grain */
    .grain {
      background-image: radial-gradient(rgba(120,80,40,.04) 1px, transparent 1px);
      background-size: 3px 3px;
    }

    /* Form inputs */
    .field {
      display: flex; flex-direction: column; gap: 6px;
    }
    .field label {
      font-size: 11px; font-weight: 600;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .field input, .field select, .field textarea {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--r2);
      background: var(--card);
      font-size: 14px;
      color: var(--ink);
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: var(--terracotta);
      box-shadow: 0 0 0 3px rgba(196,90,62,.12);
    }

    /* Severity background-text tints */
    .sev-none    { color: var(--sev-none); }
    .sev-mild    { color: var(--sev-mild); }
    .sev-mod     { color: var(--sev-mod); }
    .sev-high    { color: var(--sev-high); }
    .sev-extreme { color: var(--sev-extreme); }

    .bg-sev-none    { background: rgba(110,138,106,.10); color: var(--sev-none); }
    .bg-sev-mild    { background: rgba(200,154,62,.12); color: var(--sev-mild); }
    .bg-sev-mod     { background: rgba(214,138,94,.14); color: var(--sev-mod); }
    .bg-sev-high    { background: rgba(179,80,62,.12); color: var(--sev-high); }
    .bg-sev-extreme { background: rgba(111,59,88,.12); color: var(--sev-extreme); }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer {
      0%   { background-position: 100% 50%; }
      100% { background-position:   0% 50%; }
    }

    /* ===== Tablet ≤1024px ========================================= */
    @media (max-width: 1024px) {
      /* Hide nav text labels — handled by isCompact in TopNav JS too */
      .nav-label { display: none !important; }
    }

    /* ===== Bottom Tab Bar (mobile-native navigation) ============== */
    .pss-bottom-tab {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      display: flex;
      background: rgba(251,246,239,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--line);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .pss-bottom-tab-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px 4px; min-height: 56px;
      touch-action: manipulation;
      border-top: 2px solid transparent;
      transition: color .15s, border-color .15s;
      color: var(--ink-4); font-size: 10px; font-weight: 500;
      gap: 3px;
    }
    .pss-bottom-tab-btn.tab-active {
      color: var(--terracotta);
      border-top-color: var(--terracotta);
      font-weight: 700;
    }
    /* Slim header for mobile */
    .pss-slim-header {
      display: flex; align-items: center; gap: 8px;
      padding: max(10px, env(safe-area-inset-top, 10px)) 16px 10px;
      background: rgba(251,246,239,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 50;
    }

    /* ===== Mobile ≤640px ========================================== */
    @media (max-width: 640px) {
      /* Tap targets ≥44px */
      .btn { min-height: 44px !important; }

      /* Prevent iOS zoom on input focus (font-size < 16px triggers zoom) */
      input, select, textarea { font-size: 16px !important; }

      /* Scale headings for small screens */
      h1 { font-size: 26px !important; }
      h2 { font-size: 20px !important; }
      h3 { font-size: 18px !important; }

      /* Thai text readability — minimum 13px for secondary, 15px for body */
      p { font-size: 15px !important; line-height: 1.65 !important; }

      /* Sticky bottom CTA (AssessmentScreen prev/next) */
      .pss-sticky-cta {
        position: fixed !important;
        bottom: 0; left: 0; right: 0;
        display: flex !important; gap: 10px;
        padding: 10px 16px calc(10px + env(safe-area-inset-bottom)) !important;
        background: rgba(251,246,239,0.96);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-top: 1px solid var(--line);
        z-index: 200;
        justify-content: space-between !important;
      }
      .pss-sticky-cta .btn { flex: 1; }

      /* Bottom sheet overlay (AddFamilyForm on mobile) */
      .sheet-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.4); z-index: 499;
      }
      .bottom-sheet {
        position: fixed !important;
        bottom: 0 !important; left: 0 !important; right: 0 !important;
        border-radius: 20px 20px 0 0 !important;
        padding: 24px 20px calc(24px + env(safe-area-inset-bottom)) !important;
        max-height: min(90dvh, 90vh); overflow-y: auto;
        z-index: 500;
        margin-bottom: 0 !important;
      }
    }
  </style>
</head>
